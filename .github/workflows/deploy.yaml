name: "Full CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # PART 0: TESTING & SECURITY
  # ==========================================
  test:
    name: "Run Tests & Lint"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout code"
      uses: actions/checkout@v4
    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: "Lint and Format with Ruff"
      run: |
        pip install ruff
        ruff check app.py   # Lints code
        ruff format --check app.py  # Checks if formatting matches
    - name: "Run tests with pytest"
      run: |
        pytest

    - name: "Smoke test: App health check"
      run: |
        # Start the app in the background
        python app.py &
        APP_PID=$!
        # Wait for the app to start
        sleep 5
        # Check the health endpoint (adjust if needed)
        curl --fail http://localhost:5000/ || (kill $APP_PID && exit 1)
        # Stop the app
        kill $APP_PID

  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout code"
      uses: actions/checkout@v4
    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: "Install dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pip-audit
    - name: "Run pip-audit for vulnerabilities"
      run: |
        pip-audit

  # ==========================================
  # PART 1: INFRASTRUCTURE AS CODE (IaC)
  # ==========================================
  infrastructure:
    name: "Provision AWS Resources"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout code"
      uses: actions/checkout@v4

    - name: "Configure AWS credentials"
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ap-southeast-1

    - name: "Setup Terraform"
      uses: hashicorp/setup-terraform@v3

    - name: "IaC: Terraform Init and Apply"
      run: |
        terraform -chdir=terraform init
        terraform -chdir=terraform apply -auto-approve

  # ==========================================
  # PART 2: THE CI/CD PROCESS
  # ==========================================
  deploy:
    name: "Build & Deploy App"
    runs-on: ubuntu-latest
    needs: [ test, security, infrastructure ]
    steps:
    - name: "Checkout code"
      uses: actions/checkout@v4

    - name: "Configure AWS credentials"
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ap-southeast-1

    # ------------------------------------------
    # [CONTINUOUS INTEGRATION - CI SECTION]
    # ------------------------------------------
    - name: "Login to ECR"
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: "CI: Build and Push Docker Image"
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPO: auto-deployment-practice
      run: |
        # 1. Build the image and give it TWO tags at the same time
        docker build -t $ECR_REGISTRY/$REPO:${{ github.sha }} \
                     -t $ECR_REGISTRY/$REPO:latest .
        # 2. Now that they exist locally, push them both to AWS

        docker push $ECR_REGISTRY/$REPO:${{ github.sha }}
        docker push $ECR_REGISTRY/$REPO:latest
        # 3. Output the SHA version so the next step knows exactly which one to deploy
        echo "image=$ECR_REGISTRY/$REPO:${{ github.sha }}" >> $GITHUB_OUTPUT

    # ------------------------------------------
    # [CONTINUOUS DEPLOYMENT - CD SECTION]
    # ------------------------------------------
    - name: "CD: Update ECS Task Definition"
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: hello-world
        image: ${{ steps.build-image.outputs.image }}

    - name: "CD: Deploy to Amazon ECS"
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: auto-deployment-practice-service
        cluster: auto-deployment-practice-cluster
        wait-for-service-stability: false
